name: Build song manifest

on:
  push:
    branches: [ main ]
    paths:
      - 'songs/**'
      - 'scripts/build-manifest.mjs'
      - '.github/workflows/build-manifest.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-manifest
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install parser
        run: npm install --no-save music-metadata@^10

      - name: Build songs.json + covers
        run: |
          if [ -f .r2-managed ]; then
            echo "songs.json è gestito da Cloudflare R2 (tools/upload-r2.mjs) — salto la generazione.";
            exit 0;
          fi
          node scripts/build-manifest.mjs

      - name: Commit results
        run: |
          git config user.name  "spoty-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A songs.json covers
          if git diff --cached --quiet; then
            echo "Manifest already up to date."
          else
            git commit -m "chore: rebuild song manifest [skip ci]"
            git push
          fi
